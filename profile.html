<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>建中駝客隊 - 個人紀錄</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f4f6f9; font-family: 'Helvetica Neue', Arial, sans-serif; }
    .header-banner {
      background: linear-gradient(135deg, #198754 0%, #146c43 100%);
      color: white; padding: 30px 0; margin-bottom: 30px; border-radius: 0 0 20px 20px;
    }
    .profile-card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
    .stat-box { text-align: center; padding: 15px; background-color: #f8f9fa; border-radius: 10px; }
    .stat-title { font-size: 0.9rem; color: #6c757d; margin-bottom: 5px; }
    .stat-value { font-size: 1.5rem; font-weight: bold; color: #198754; }
    .best-score-row { background-color: #e8f5e9 !important; }
  </style>
</head>
<body>

  <div class="header-banner text-center">
    <div class="container">
      <h2 class="fw-bold">🐫 建中駝客隊差點排行榜</h2>
      <p class="mb-0">個人歷史戰績紀錄</p>
    </div>
  </div>

  <div class="container mb-5">
    <div class="row justify-content-center">
      <div class="col-lg-10">
        <div class="mb-3"><a href="index.html" class="btn btn-outline-secondary">← 返回總排行榜</a></div>
        <div id="loading" class="text-center py-5">
          <div class="spinner-border text-success" role="status"></div>
        </div>

        <div id="contentArea" class="d-none">
          <div class="profile-card">
            <h3 id="playerNameDisplay" class="fw-bold text-center mb-4">載入中...</h3>
            <div class="row g-3">
              <div class="col-6 col-md-3">
                <div class="stat-box">
                  <div class="stat-title">最新差點</div>
                  <div class="stat-value" id="playerHandicap">--</div>
                </div>
              </div>
              <div class="col-6 col-md-3">
                <div class="stat-box">
                  <div class="stat-title">總參賽場次</div>
                  <div class="stat-value text-dark" id="playerRounds">0</div>
                </div>
              </div>
              <div class="col-6 col-md-3">
                <div class="stat-box">
                  <div class="stat-title">平均桿數</div>
                  <div class="stat-value text-dark" id="playerAvgScore">--</div>
                </div>
              </div>
              <div class="col-6 col-md-3">
                <div class="stat-box">
                  <div class="stat-title">系統最新排名</div>
                  <div class="stat-value text-primary" id="playerRank">-</div>
                </div>
              </div>
            </div>
          </div>

          <div class="profile-card table-responsive">
            <h5 class="fw-bold mb-3">⛳ 歷史成績紀錄</h5>
            <table class="table table-hover text-center">
              <thead>
                <tr>
                  <th>日期</th>
                  <th>球場</th>
                  <th>總桿</th>
                  <th>CR</th>
                  <th>Slope</th>
                  <th>Diff</th>
                </tr>
              </thead>
              <tbody id="scoreList"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCpMFygSmUWsLxizZkds9v_EiHNeWOsT_c",
      authDomain: "cksh-handicap.firebaseapp.com",
      projectId: "cksh-handicap",
      storageBucket: "cksh-handicap.firebasestorage.app",
      messagingSenderId: "878448349821",
      appId: "1:878448349821:web:9f70e7ee27cdb6cd5ed714"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    document.addEventListener("DOMContentLoaded", fetchPlayerData);

    async function fetchPlayerData() {
      const urlParams = new URLSearchParams(window.location.search);
      const playerId = urlParams.get('player');
      if (!playerId) return;

      try {
        // 1. 抓取個人基本資料
        const playerSnap = await getDoc(doc(db, "players", playerId));
        let currentHcp = 999;
        if (playerSnap.exists()) {
          const p = playerSnap.data();
          currentHcp = p.current_handicap || 999;
          document.getElementById("playerNameDisplay").textContent = p.name_zh || playerId;
          document.getElementById("playerHandicap").textContent = (currentHcp < 999) ? currentHcp.toFixed(1) : "--";
          document.getElementById("playerRounds").textContent = p.total_rounds || 0;
          document.getElementById("playerAvgScore").textContent = (p.average_score > 0) ? p.average_score.toFixed(1) : "--";
        }

        // 2. 抓取全隊資料來計算排名 (確保排名與首頁邏輯一致)
        const allPlayersSnap = await getDocs(collection(db, "players"));
        let allPlayers = [];
        allPlayersSnap.forEach(d => {
          let dData = d.data();
          allPlayers.push({ id: d.id, handicap: dData.current_handicap || 999 });
        });

        // 排序規則與 index.html 相同
        allPlayers.sort((a, b) => {
          if (a.handicap >= 999 && b.handicap < 999) return 1;
          if (a.handicap < 999 && b.handicap >= 999) return -1;
          return a.handicap - b.handicap;
        });

        const rankIndex = allPlayers.findIndex(p => p.id === playerId);
        if (rankIndex !== -1 && currentHcp < 999) {
          document.getElementById("playerRank").textContent = rankIndex + 1;
        } else {
          document.getElementById("playerRank").textContent = "-";
        }

        // 3. 抓取個人成績紀錄
        const q = query(collection(db, "scores"), where("player_id", "==", playerId));
        const querySnapshot = await getDocs(q);
        let scores = [];
        querySnapshot.forEach(doc => scores.push(doc.data()));
        scores.sort((a, b) => new Date(b.date) - new Date(a.date));

        const tbody = document.getElementById("scoreList");
        let bestGross = scores.length > 0 ? Math.min(...scores.map(s => s.gross_score)) : 0;

        scores.forEach(s => {
          const tr = document.createElement("tr");
          if (s.gross_score === bestGross && bestGross > 0) tr.classList.add("best-score-row");
          tr.innerHTML = `
            <td>${s.date}</td>
            <td>${s.course_name}</td>
            <td class="fw-bold">${s.gross_score}</td>
            <td>${s.course_rating.toFixed(1)}</td>
            <td>${s.slope_rating}</td>
            <td class="text-primary">${s.differential.toFixed(1)}</td>
          `;
          tbody.appendChild(tr);
        });

        document.getElementById("loading").classList.add("d-none");
        document.getElementById("contentArea").classList.remove("d-none");
      } catch (e) { console.error(e); }
    }
  </script>
</body>
</html>
