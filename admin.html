<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>成績輸入管理 - 建中駝客隊</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; font-family: 'Helvetica Neue', Arial, sans-serif; }
    .card { border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .header-bg { background-color: #198754; color: white; border-radius: 15px 15px 0 0; padding: 20px; }
  </style>
</head>
<body>

<div class="container mt-5 mb-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="card">
        <div class="header-bg text-center">
          <h3 class="mb-0">⛳ 新增賽事成績</h3>
          <small>自動計算 WHS 差點</small>
        </div>
        
        <div class="card-body p-4">
          <div id="alertBox" class="alert d-none" role="alert"></div>

          <form id="scoreForm">
            <div class="mb-3">
              <label for="playerName" class="form-label fw-bold">球員姓名</label>
              <select class="form-select" id="playerName" required disabled>
                <option value="">載入球員名單中...</option>
              </select>
            </div>

            <div class="mb-3">
              <label for="playDate" class="form-label fw-bold">比賽日期</label>
              <input type="date" class="form-control" id="playDate" required>
            </div>

            <div class="mb-3">
              <label for="courseSelect" class="form-label fw-bold">比賽球場</label>
              <select class="form-select" id="courseSelect" required disabled>
                <option value="">載入球場資料中...</option>
              </select>
              <div id="courseDetails" class="form-text text-primary mt-1"></div>
            </div>

            <div class="mb-4">
              <label for="grossScore" class="form-label fw-bold">總桿數</label>
              <input type="number" class="form-control" id="grossScore" placeholder="例如：85" required min="50" max="200">
            </div>

            <div class="d-grid">
              <button type="submit" class="btn btn-success btn-lg" id="submitBtn">
                <span id="btnText">送出成績並計算差點</span>
                <span id="btnSpinner" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  // ==========================================
  // 1. 基本設定區
  // ==========================================
  
  // 請在這裡填入你的 Google Apps Script Web App 網址
  const GAS_API_URL = "https://script.google.com/macros/s/AKfycbx3cO5-OYjnSSEr0aZGjPubkT5g28Ttp_ob35lBXboMXBifdiEMd6fvE6GJXLEJM2QBYg/exec"; 

  // 你的 Firebase 設定檔
  const firebaseConfig = {
    apiKey: "AIzaSyCpMFygSmUWsLxizZkds9v_EiHNeWOsT_c",
    authDomain: "cksh-handicap.firebaseapp.com",
    projectId: "cksh-handicap",
    storageBucket: "cksh-handicap.firebasestorage.app",
    messagingSenderId: "878448349821",
    appId: "1:878448349821:web:9f70e7ee27cdb6cd5ed714"
  };

  // 初始化 Firebase
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let coursesData = [];

  // ==========================================
  // 2. 網頁載入時的初始化動作
  // ==========================================
  document.addEventListener("DOMContentLoaded", () => {
    // 設定今天日期為預設值
    document.getElementById("playDate").valueAsDate = new Date();
    
    // 同時去抓取球場清單與球員名單
    fetchCourses();
    fetchPlayers();
  });

  // ==========================================
  // 3. 從 Firestore 抓取球員名單 (下拉選單)
  // ==========================================
  async function fetchPlayers() {
    try {
      const querySnapshot = await getDocs(collection(db, "players"));
      const select = document.getElementById("playerName");
      select.innerHTML = '<option value="">請選擇球員...</option>';
      
      let players = [];
      querySnapshot.forEach((doc) => {
        players.push({
          id: doc.id,
          name: doc.data().name_zh || doc.id
        });
      });

      // 依照名字筆畫或拼音排序，方便尋找
      players.sort((a, b) => a.name.localeCompare(b.name));

      players.forEach(p => {
        const option = document.createElement("option");
        option.value = p.id; // 我們設計用名字當作 ID
        option.textContent = p.name;
        select.appendChild(option);
      });
      
      select.disabled = false;
    } catch (error) {
      showAlert("讀取球員資料失敗，請檢查網路連線。", "danger");
      console.error(error);
    }
  }

  // ==========================================
  // 4. 從 GAS 抓取球場清單
  // ==========================================
  async function fetchCourses() {
    try {
      const response = await fetch(GAS_API_URL);
      const result = await response.json();
      
      if (result.status === "success") {
        coursesData = result.data;
        populateCourseDropdown();
      } else {
        showAlert("讀取球場資料失敗：" + result.message, "danger");
      }
    } catch (error) {
      showAlert("無法連線到後端 API，請確認網址是否正確。", "danger");
      console.error(error);
    }
  }

  function populateCourseDropdown() {
    const select = document.getElementById("courseSelect");
    select.innerHTML = '<option value="">請選擇球場與 Tee 台...</option>';
    
    coursesData.forEach((course, index) => {
      const option = document.createElement("option");
      option.value = index;
      option.textContent = `${course.course_name} - ${course.tee_color} (${course.gender})`;
      select.appendChild(option);
    });
    
    select.disabled = false;
  }

  // 顯示球場細節 (CR & Slope)
  document.getElementById("courseSelect").addEventListener("change", (e) => {
    const detailDiv = document.getElementById("courseDetails");
    const selectedIndex = e.target.value;
    
    if (selectedIndex === "") {
      detailDiv.textContent = "";
    } else {
      const c = coursesData[selectedIndex];
      detailDiv.textContent = `Course Rating: ${c.course_rating} | Slope: ${c.slope_rating}`;
    }
  });

  // ==========================================
  // 5. 處理表單送出 (傳給 GAS 計算)
  // ==========================================
  document.getElementById("scoreForm").addEventListener("submit", async (e) => {
    e.preventDefault(); 
    
    const selectedCourseIndex = document.getElementById("courseSelect").value;
    if (selectedCourseIndex === "") {
      showAlert("請選擇球場！", "warning");
      return;
    }

    const playerId = document.getElementById("playerName").value;
    if (playerId === "") {
      showAlert("請選擇球員！", "warning");
      return;
    }

    const selectedCourse = coursesData[selectedCourseIndex];
    
    const postData = {
      player_id: playerId,
      date: document.getElementById("playDate").value,
      gross_score: document.getElementById("grossScore").value,
      course_name: selectedCourse.course_name,
      course_rating: selectedCourse.course_rating,
      slope_rating: selectedCourse.slope_rating
    };

    setLoading(true);

    try {
      const response = await fetch(GAS_API_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(postData)
      });
      
      const result = await response.json();

      if (result.status === "success") {
        let msg = `✅ 成績新增成功！<br>本次差異值: <b>${result.differential}</b>`;
        if (result.new_handicap !== null) {
          msg += `<br>🔥 最新 WHS 差點更新為: <b>${result.new_handicap}</b>`;
        } else {
          msg += `<br>⚠️ 該球員場次尚不足 3 場，差點暫不更新。`;
        }
        showAlert(msg, "success");
        // 清空總桿數，保留球員與球場，方便連續輸入
        document.getElementById("grossScore").value = "";
      } else {
        showAlert("❌ 錯誤：" + result.message, "danger");
      }
    } catch (error) {
      showAlert("❌ 送出失敗，請檢查網路或 API 設定。", "danger");
      console.error(error);
    } finally {
      setLoading(false);
    }
  });

  // ==========================================
  // 輔助函式 (顯示訊息 & 按鈕狀態)
  // ==========================================
  function showAlert(htmlMessage, type) {
    const alertBox = document.getElementById("alertBox");
    alertBox.className = `alert alert-${type}`;
    alertBox.innerHTML = htmlMessage;
    alertBox.classList.remove("d-none");
    if(type === "success") setTimeout(() => alertBox.classList.add("d-none"), 10000);
  }

  function setLoading(isLoading) {
    document.getElementById("btnText").classList.toggle("d-none", isLoading);
    document.getElementById("btnSpinner").classList.toggle("d-none", !isLoading);
    document.getElementById("submitBtn").disabled = isLoading;
  }
</script>
</body>
</html>
