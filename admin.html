<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>成績批次輸入 - 建中駝客隊</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; font-family: 'Helvetica Neue', Arial, sans-serif; }
    .card { border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .header-bg { background-color: #198754; color: white; border-radius: 15px 15px 0 0; padding: 20px; }
    textarea { font-family: monospace; font-size: 1.1rem; }
  </style>
</head>
<body>

<div class="container mt-5 mb-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="card">
        <div class="header-bg text-center">
          <h3 class="mb-0">⛳ 批次賽事成績輸入</h3>
          <small>支援從 Excel 直接複製貼上</small>
        </div>
        
        <div class="card-body p-4">
          <div id="alertBox" class="alert d-none" role="alert"></div>

          <form id="scoreForm">
            <div class="mb-3">
              <label class="form-label fw-bold">第一步：選擇比賽日期</label>
              <input type="date" class="form-control" id="playDate" required>
            </div>

            <div class="mb-4">
              <label class="form-label fw-bold">第二步：選擇比賽球場與 Tee 台</label>
              <select class="form-select" id="courseSelect" required disabled>
                <option value="">載入球場資料中...</option>
              </select>
              <div id="courseDetails" class="form-text text-primary mt-1"></div>
            </div>

            <div class="mb-4">
              <label class="form-label fw-bold text-success">第三步：貼上球員與總桿數</label>
              <div class="form-text mb-2">請從 Excel 複製兩欄 (姓名、桿數) 直接貼在下方：</div>
              <textarea class="form-control bg-light" id="pasteArea" rows="8" placeholder="王小明   85&#10;陳大頭   92&#10;林阿呆   105" required></textarea>
            </div>

            <div class="d-grid">
              <button type="submit" class="btn btn-success btn-lg" id="submitBtn">
                <span id="btnText">解析並送出成績</span>
                <span id="btnSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  // ==========================================
  // 請貼上你的 GAS 網頁應用程式網址 (記得重新部署)
  // ==========================================
  const GAS_API_URL = "https://script.google.com/macros/s/AKfycbx3cO5-OYjnSSEr0aZGjPubkT5g28Ttp_ob35lBXboMXBifdiEMd6fvE6GJXLEJM2QBYg/exec"; 

  const firebaseConfig = {
    apiKey: "AIzaSyCpMFygSmUWsLxizZkds9v_EiHNeWOsT_c",
    authDomain: "cksh-handicap.firebaseapp.com",
    projectId: "cksh-handicap",
    storageBucket: "cksh-handicap.firebasestorage.app",
    messagingSenderId: "878448349821",
    appId: "1:878448349821:web:9f70e7ee27cdb6cd5ed714"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let coursesData = [];
  let validPlayers = []; // 用來存系統中的合法球員名單，做防呆檢查

  document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("playDate").valueAsDate = new Date();
    fetchCourses();
    fetchPlayers();
  });

  // 抓取合法球員名單
  async function fetchPlayers() {
    try {
      const querySnapshot = await getDocs(collection(db, "players"));
      querySnapshot.forEach(doc => {
        let name = doc.data().name_zh || doc.id;
        validPlayers.push(name.trim());
      });
    } catch (error) {
      console.error("載入球員名單失敗:", error);
    }
  }

  // 抓取球場資料
  async function fetchCourses() {
    try {
      const response = await fetch(GAS_API_URL);
      const result = await response.json();
      if (result.status === "success") {
        coursesData = result.data;
        const select = document.getElementById("courseSelect");
        select.innerHTML = '<option value="">請選擇球場與 Tee 台...</option>';
        coursesData.forEach((course, index) => {
          const option = document.createElement("option");
          option.value = index;
          option.textContent = `${course.course_name} - ${course.tee_color} (${course.gender})`;
          select.appendChild(option);
        });
        select.disabled = false;
      }
    } catch (error) {
      showAlert("無法連線到球場資料庫。", "danger");
    }
  }

  document.getElementById("courseSelect").addEventListener("change", (e) => {
    const detailDiv = document.getElementById("courseDetails");
    if (e.target.value === "") {
      detailDiv.textContent = "";
    } else {
      const c = coursesData[e.target.value];
      detailDiv.textContent = `CR: ${c.course_rating} | Slope: ${c.slope_rating}`;
    }
  });

  // 表單送出：解析文字並發送
  document.getElementById("scoreForm").addEventListener("submit", async (e) => {
    e.preventDefault(); 
    
    const selectedCourseIndex = document.getElementById("courseSelect").value;
    if (selectedCourseIndex === "") {
      showAlert("請選擇球場！", "warning");
      return;
    }

    const rawText = document.getElementById("pasteArea").value.trim();
    if (!rawText) {
      showAlert("請貼上成績資料！", "warning");
      return;
    }

    // 解析文字 (按行分割)
    const lines = rawText.split('\n');
    let parsedScores = [];
    let errors = [];
    let unknownPlayers = [];

    lines.forEach((line, index) => {
      line = line.trim();
      if (!line) return; // 跳過空行

      // 將多個空白或 Tab 視為分隔符號切開
      const parts = line.split(/\s+/);
      if (parts.length >= 2) {
        // 假設最後一截是桿數，前面都是名字
        const score = Number(parts.pop());
        const name = parts.join(' ').trim();

        if (isNaN(score)) {
          errors.push(`第 ${index + 1} 行：找不到數字桿數`);
        } else {
          // 檢查錯字：球員是否在系統內
          if (!validPlayers.includes(name)) {
            unknownPlayers.push(name);
          }
          parsedScores.push({ player_id: name, gross_score: score });
        }
      } else {
        errors.push(`第 ${index + 1} 行：格式錯誤 (需包含姓名與桿數)`);
      }
    });

    // 如果有格式錯誤，直接擋下
    if (errors.length > 0) {
      showAlert("❌ 解析失敗，請檢查格式：<br>" + errors.join("<br>"), "danger");
      return;
    }

    // 如果有錯字球員，直接擋下並警告
    if (unknownPlayers.length > 0) {
      showAlert("⚠️ 系統找不到以下球員，請檢查是否有錯字：<br><b>" + unknownPlayers.join(", ") + "</b>", "danger");
      return;
    }

    // 準備送出的資料包
    const selectedCourse = coursesData[selectedCourseIndex];
    const postData = {
      date: document.getElementById("playDate").value,
      course_name: selectedCourse.course_name,
      course_rating: selectedCourse.course_rating,
      slope_rating: selectedCourse.slope_rating,
      scores: parsedScores // 傳送陣列
    };

    setLoading(true);

    try {
      const response = await fetch(GAS_API_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(postData)
      });
      
      const result = await response.json();

      if (result.status === "success") {
        showAlert(`✅ ${result.message}<br>已自動為上述球員重新計算最新差點！`, "success");
        document.getElementById("pasteArea").value = ""; // 清空輸入框
      } else {
        showAlert("❌ 後端處理錯誤：" + result.message, "danger");
      }
    } catch (error) {
      showAlert("❌ 伺服器無回應，請檢查網路連線。", "danger");
    } finally {
      setLoading(false);
    }
  });

  function showAlert(htmlMessage, type) {
    const alertBox = document.getElementById("alertBox");
    alertBox.className = `alert alert-${type}`;
    alertBox.innerHTML = htmlMessage;
    alertBox.classList.remove("d-none");
    if(type === "success") setTimeout(() => alertBox.classList.add("d-none"), 10000);
  }

  function setLoading(isLoading) {
    document.getElementById("btnText").classList.toggle("d-none", isLoading);
    document.getElementById("btnSpinner").classList.toggle("d-none", !isLoading);
    document.getElementById("submitBtn").disabled = isLoading;
  }
</script>
</body>
</html>
