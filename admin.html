<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>球隊成績輸入管理</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; font-family: 'Helvetica Neue', Arial, sans-serif; }
    .card { border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .header-bg { background-color: #198754; color: white; border-radius: 15px 15px 0 0; padding: 20px; }
  </style>
</head>
<body>

<div class="container mt-5 mb-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="card">
        <div class="header-bg text-center">
          <h3 class="mb-0">⛳ 新增賽事成績</h3>
          <small>系統將自動計算 WHS 差點</small>
        </div>
        
        <div class="card-body p-4">
          <div id="alertBox" class="alert d-none" role="alert"></div>

          <form id="scoreForm">
            <div class="mb-3">
              <label for="playerName" class="form-label fw-bold">球員姓名 (需與資料庫名稱一致)</label>
              <input type="text" class="form-control" id="playerName" placeholder="例如：王小明" required>
            </div>

            <div class="mb-3">
              <label for="playDate" class="form-label fw-bold">比賽日期</label>
              <input type="date" class="form-control" id="playDate" required>
            </div>

            <div class="mb-3">
              <label for="courseSelect" class="form-label fw-bold">比賽球場 (從 Google Sheet 載入)</label>
              <select class="form-select" id="courseSelect" required disabled>
                <option value="">載入球場資料中...</option>
              </select>
              <div id="courseDetails" class="form-text text-primary mt-1"></div>
            </div>

            <div class="mb-4">
              <label for="grossScore" class="form-label fw-bold">總桿數 (Gross Score)</label>
              <input type="number" class="form-control" id="grossScore" placeholder="例如：85" required min="50" max="200">
            </div>

            <div class="d-grid">
              <button type="submit" class="btn btn-success btn-lg" id="submitBtn">
                <span id="btnText">送出成績並計算差點</span>
                <span id="btnSpinner" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // ==========================================
  // 請在這裡填入你的 Google Apps Script Web App 網址
  // ==========================================
  const GAS_API_URL = "https://script.google.com/macros/s/AKfycbx3cO5-OYjnSSEr0aZGjPubkT5g28Ttp_ob35lBXboMXBifdiEMd6fvE6GJXLEJM2QBYg/exec"; 

  // 儲存從後端抓來的球場資料
  let coursesData = [];

  // 網頁載入完成後，立刻去抓球場資料
  document.addEventListener("DOMContentLoaded", async () => {
    // 設定今天日期為預設值
    document.getElementById("playDate").valueAsDate = new Date();
    
    try {
      const response = await fetch(GAS_API_URL);
      const result = await response.json();
      
      if (result.status === "success") {
        coursesData = result.data;
        populateCourseDropdown();
      } else {
        showAlert("讀取球場資料失敗：" + result.message, "danger");
      }
    } catch (error) {
      showAlert("無法連線到後端 API，請確認網址是否正確。", "danger");
      console.error(error);
    }
  });

  // 把球場資料塞入下拉選單
  function populateCourseDropdown() {
    const select = document.getElementById("courseSelect");
    select.innerHTML = '<option value="">請選擇球場與 Tee 台...</option>';
    
    coursesData.forEach((course, index) => {
      const option = document.createElement("option");
      option.value = index; // 用陣列索引當 value，方便之後取資料
      // 顯示格式： 東華 - Regular (Male)
      option.textContent = `${course.course_name} - ${course.tee_color} (${course.gender})`;
      select.appendChild(option);
    });
    
    select.disabled = false;
  }

  // 當使用者選擇球場時，顯示該球場的 CR 和 Slope
  document.getElementById("courseSelect").addEventListener("change", (e) => {
    const detailDiv = document.getElementById("courseDetails");
    const selectedIndex = e.target.value;
    
    if (selectedIndex === "") {
      detailDiv.textContent = "";
    } else {
      const c = coursesData[selectedIndex];
      detailDiv.textContent = `Course Rating: ${c.course_rating} | Slope: ${c.slope_rating}`;
    }
  });

  // 處理表單送出
  document.getElementById("scoreForm").addEventListener("submit", async (e) => {
    e.preventDefault(); // 防止網頁重新整理
    
    const selectedIndex = document.getElementById("courseSelect").value;
    if (selectedIndex === "") {
      showAlert("請選擇球場！", "warning");
      return;
    }

    const selectedCourse = coursesData[selectedIndex];
    
    // 整理要傳送給後端的資料
    const postData = {
      player_id: document.getElementById("playerName").value.trim(),
      date: document.getElementById("playDate").value,
      gross_score: document.getElementById("grossScore").value,
      course_name: selectedCourse.course_name,
      course_rating: selectedCourse.course_rating,
      slope_rating: selectedCourse.slope_rating
    };

    // 切換按鈕狀態 (Loading)
    setLoading(true);

    try {
      // 呼叫 GAS POST API
      const response = await fetch(GAS_API_URL, {
        method: "POST",
        // 使用 text/plain 避免跨域預檢 (CORS preflight) 問題，GAS 後端一樣能解析 JSON
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(postData)
      });
      
      const result = await response.json();

      if (result.status === "success") {
        let msg = `✅ 成績新增成功！<br>本次差異值: <b>${result.differential}</b>`;
        if (result.new_handicap !== null) {
          msg += `<br>🔥 最新 WHS 差點更新為: <b>${result.new_handicap}</b>`;
        } else {
          msg += `<br>⚠️ 該球員場次尚不足 3 場，差點暫不更新。`;
        }
        showAlert(msg, "success");
        // 清空總桿數欄位，方便輸入下一筆
        document.getElementById("grossScore").value = "";
      } else {
        showAlert("❌ 錯誤：" + result.message, "danger");
      }
    } catch (error) {
      showAlert("❌ 送出失敗，請檢查網路連線或 API 設定。", "danger");
      console.error(error);
    } finally {
      setLoading(false);
    }
  });

  // 顯示訊息框的輔助函式
  function showAlert(htmlMessage, type) {
    const alertBox = document.getElementById("alertBox");
    alertBox.className = `alert alert-${type}`;
    alertBox.innerHTML = htmlMessage;
    alertBox.classList.remove("d-none");
    // 如果是成功訊息，10秒後自動隱藏
    if(type === "success") {
        setTimeout(() => alertBox.classList.add("d-none"), 10000);
    }
  }

  // 控制按鈕 Loading 狀態的輔助函式
  function setLoading(isLoading) {
    document.getElementById("btnText").classList.toggle("d-none", isLoading);
    document.getElementById("btnSpinner").classList.toggle("d-none", !isLoading);
    document.getElementById("submitBtn").disabled = isLoading;
  }
</script>
</body>
</html>
