<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>建中駝客隊差點排行榜</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f4f6f9; font-family: 'Helvetica Neue', Arial, sans-serif; }
    .header-banner {
      background: linear-gradient(135deg, #198754 0%, #146c43 100%);
      color: white;
      padding: 40px 0;
      margin-bottom: 30px;
      border-radius: 0 0 20px 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .table-container { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .table thead th { background-color: #f8f9fa; text-align: center; white-space: nowrap; }
    .table tbody td { text-align: center; vertical-align: middle; }
    .player-name { color: #0d6efd; font-weight: bold; text-decoration: none; }
    .player-name:hover { text-decoration: underline; }
    .rank-1 { font-size: 1.5rem; font-weight: bold; color: #ffc107; }
    .rank-2 { font-size: 1.2rem; font-weight: bold; color: #adb5bd; }
    .rank-3 { font-size: 1.1rem; font-weight: bold; color: #cd7f32; }
  </style>
</head>
<body>

  <div class="header-banner text-center">
    <div class="container">
      <h1 class="display-5 fw-bold">⛳ 建中駝客隊差點排行榜</h1>
      <p class="lead mb-0">WHS 即時排名系統</p>
    </div>
  </div>

  <div class="container mb-5">
    <div class="row justify-content-center">
      <div class="col-lg-10">
        <div class="table-container table-responsive">
          <div id="loading" class="text-center py-5">
            <div class="spinner-border text-success" role="status"></div>
            <p class="mt-3 text-muted">載入排行榜中...</p>
          </div>

          <table class="table table-hover d-none" id="leaderboardTable">
            <thead>
              <tr>
                <th>最新排名</th>
                <th>趨勢</th>
                <th>球員名字</th>
                <th>參賽場次</th>
                <th>平均桿數</th>
                <th>最新差點</th>
              </tr>
            </thead>
            <tbody id="playerList"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCpMFygSmUWsLxizZkds9v_EiHNeWOsT_c",
      authDomain: "cksh-handicap.firebaseapp.com",
      projectId: "cksh-handicap",
      storageBucket: "cksh-handicap.firebasestorage.app",
      messagingSenderId: "878448349821",
      appId: "1:878448349821:web:9f70e7ee27cdb6cd5ed714"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    document.addEventListener("DOMContentLoaded", fetchLeaderboard);

    async function fetchLeaderboard() {
      try {
        const querySnapshot = await getDocs(collection(db, "players"));
        let players = [];
        
        querySnapshot.forEach((doc) => {
          let data = doc.data();
          // 【防護鎖】：確保數值存在，否則給予預設值
          players.push({
            id: doc.id,
            name: data.name_zh || doc.id,
            handicap: data.current_handicap !== undefined ? data.current_handicap : null,
            prevRank: data.previous_rank || 0,
            rounds: data.total_rounds || 0,
            avgScore: data.average_score || null
          });
        });

        // 排序：差點越低越前面，沒差點的排最後
        players.sort((a, b) => {
          if (a.handicap === null) return 1;
          if (b.handicap === null) return -1;
          return a.handicap - b.handicap;
        });

        renderTable(players);
      } catch (error) {
        console.error("讀取失敗：", error);
        document.getElementById("loading").innerHTML = "讀取失敗，請檢查資料庫權限。";
      }
    }

    function renderTable(players) {
      const tbody = document.getElementById("playerList");
      tbody.innerHTML = "";

      players.forEach((player, index) => {
        const currentRank = index + 1;
        let rankHtml = currentRank;
        if (currentRank === 1) rankHtml = `<span class="rank-1">🥇 ${currentRank}</span>`;
        if (currentRank === 2) rankHtml = `<span class="rank-2">🥈 ${currentRank}</span>`;
        if (currentRank === 3) rankHtml = `<span class="rank-3">🥉 ${currentRank}</span>`;

        // 處理數值顯示，避免 .toFixed 報錯
        const displayHandicap = (player.handicap !== null) ? player.handicap.toFixed(1) : "--";
        const displayAvgScore = (player.avgScore !== null) ? player.avgScore.toFixed(1) : "--";

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${rankHtml}</td>
          <td>-</td>
          <td><a href="profile.html?player=${encodeURIComponent(player.id)}" class="player-name">${player.name}</a></td>
          <td>${player.rounds}</td>
          <td>${displayAvgScore}</td>
          <td class="fw-bold text-success">${displayHandicap}</td>
        `;
        tbody.appendChild(tr);
      });

      document.getElementById("loading").classList.add("d-none");
      document.getElementById("leaderboardTable").classList.remove("d-none");
    }
  </script>
</body>
</html>
